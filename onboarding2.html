<body class="bg-surface text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full bg-surface shadow-sm z-50 flex items-center justify-between px-margin-mobile h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-headline-lg" data-icon="local_car_wash">local_car_wash</span>
<span class="font-headline-lg text-headline-lg font-bold text-primary">WashGo</span>
</div>
<div class="flex items-center">
<button class="p-2 text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-150 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<main class="pt-24 pb-12 px-margin-mobile max-w-md mx-auto min-h-screen flex flex-col">
<!-- Progress Stepper (Visual Cue) -->
<div class="flex justify-between items-center mb-8 px-4">
<div class="w-full bg-surface-container h-1 rounded-full overflow-hidden">
<div class="bg-primary h-full w-2/3"></div>
</div>
<span class="ml-4 font-label-lg text-label-lg text-primary whitespace-nowrap">Paso 2 de 3</span>
</div>
<!-- Headline -->
<div class="mb-8">
<h1 class="font-headline-lg text-headline-lg-mobile text-on-background mb-2">Cuéntanos sobre ti</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Personaliza tu perfil para que nuestros especialistas puedan identificarte fácilmente.</p>
</div>
<!-- Profile Photo Section -->
<div class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="w-32 h-32 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-2 border-outline-variant shadow-sm">
<img alt="Perfil" class="w-full h-full object-cover" data-alt="A professional close-up studio portrait of a friendly person smiling against a soft, blurred neutral background. The lighting is high-key and bright, emphasizing a clean and professional Corporate Modern aesthetic. The composition is centered and circular-cropped, showing clear facial features suitable for a premium service application profile. The overall atmosphere is trustworthy, hygienic, and welcoming." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXzWkoopnsrxzB67J0h80AhMjHkSFm265n1uT3sWhCw5W6eJIxHBspvWV8Ni4jfiNzdIdystg7CJzucZ4_XmKNTYG6kRqnrYPEy3DirwdZb4XtYNX9LT2uzRHmwuJV5Jgw6s6VbeXLIJKrEfk1BIWlESWcXVbpJGa99xp8sg4QH-AsKY6f62HmuYTxVVLz6g5cfEX3kz7BRSkgV5po9g83GUnRwNUzjxOLiD0m1PDx2Kr8wIt5G1Jf2NOOMotVMBcxFK1YVcbkNAo"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary p-2 rounded-full shadow-lg hover:bg-primary-container transition-all active:scale-90">
<span class="material-symbols-outlined text-lg" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<span class="mt-3 font-label-lg text-label-lg text-primary">Foto de perfil</span>
</div>
<!-- Form Fields -->
<div class="space-y-6 flex-grow">
<!-- Name Input -->
<div class="relative">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2" for="name">Nombre completo</label>
<div class="relative">
<input class="w-full h-12 bg-white border border-outline rounded-xl px-4 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="name" name="name" placeholder="Ej. Juan Pérez" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
</div>
</div>
<!-- Phone Input -->
<div class="relative">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2" for="phone">Teléfono de contacto</label>
<div class="relative">
<input class="w-full h-12 bg-white border border-outline rounded-xl px-4 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="phone" name="phone" placeholder="+34 000 000 000" type="tel"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="call">call</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-12 sticky bottom-6">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-title-lg text-title-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Finalizar</span>
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
<p class="text-center mt-4 font-label-sm text-label-sm text-on-surface-variant px-4">
                Al finalizar, aceptas nuestros Términos de Servicio y Política de Privacidad.
            </p>
</div>
</main>
<!-- Background Decoration for Corporate Feel -->
<div class="fixed top-0 right-0 -z-10 opacity-10 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="200" cy="200" fill="url(#paint0_linear)" r="200"></circle>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint0_linear" x1="200" x2="200" y1="0" y2="400">
<stop stop-color="#0056d2"></stop>
<stop offset="1" stop-color="#f9f9ff" stop-opacity="0"></stop>
</lineargradient>
</defs>
