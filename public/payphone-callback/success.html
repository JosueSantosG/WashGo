<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Autorizado - WashGo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00C853; /* PayPhone Green */
            --primary-hover: #00B24A;
            --bg: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 200, 83, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 48, 135, 0.15) 0px, transparent 50%);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid rgba(0, 200, 83, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--primary);
            position: relative;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.2s;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 24px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            background-color: var(--primary);
            color: #0F172A;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const transactionId = urlParams.get('id') || '';
            const orderId = urlParams.get('clientTransactionId') || '';

            // Guardar el transactionId en Firestore via Cloud Function
            if (orderId && transactionId) {
                var baseUrl = window.location.origin === 'http://localhost:5000'
                    ? 'http://127.0.0.1:5001/washgo-app-8392/us-central1'
                    : 'https://us-central1-washgo-app-8392.cloudfunctions.net';

                fetch(baseUrl + '/payphone/store-transaction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId: orderId, transactionId: transactionId })
                }).then(function(r) {
                    if (!r.ok) console.error('store-transaction failed:', r.status);
                }).catch(function(e) {
                    console.error('store-transaction error:', e);
                });
            }

            // Redirigir de vuelta a la app usando el esquema personalizado de PayPhone
            const redirectUrl = 'washgo://payphone-callback/success?transactionId=' + encodeURIComponent(transactionId) + '&orderId=' + encodeURIComponent(orderId);

            // Intentar redireccionar
            window.location.href = redirectUrl;

            // Fallback por si la redirección automática no se activa
            setTimeout(function() {
                var btn = document.getElementById('redirect-btn');
                if (btn) {
                    btn.href = redirectUrl;
                    btn.style.display = 'inline-block';
                    document.getElementById('status-text').innerText = 'Si la aplicación no se abre automáticamente, haz clic en el botón de abajo.';
                    document.getElementById('loader').style.display = 'none';
                }
            }, 2500);
        };
    </script>
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1>¡Pago Autorizado!</h1>
        <p id="status-text">Redirigiéndote de vuelta a la aplicación de WashGo...</p>
        <div id="loader" class="spinner"></div>
        <a id="redirect-btn" style="display: none;" class="btn" href="#">Regresar a WashGo</a>
    </div>
</body>
</html>
