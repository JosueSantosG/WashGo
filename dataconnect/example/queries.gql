query GetBusinessOrders($businessId: UUID!) @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) @redact {
    roles
  }
  business(key: { id: $businessId }) @redact {
    owner {
      id
    }
  }
  businessEmployees(where: {
    businessId: { eq: $businessId }
    employeeId: { eq_expr: "auth.uid" }
    status: { eq: ACTIVE }
  }) @redact @check(expr: "'SUPER_ADMIN' in response.user.roles || (response.business != null && response.business.owner != null && response.business.owner.id == auth.uid) || this.size() > 0", message: "No tienes permiso para acceder a las órdenes del negocio") {
    id
  }
  orders(
    where: {
      businessId: { eq: $businessId }
      status: { in: [PENDIENTE_PAGO, EN_COLA, ACEPTADO, EN_CAMINO, EN_SERVICIO] }
    }
  ) {
    id
    price
    costo
    serviceName
    observations
    type
    paymentMethod
    status
    client {
      id
      nombreCompleto
      fotoPerfil
      telefono
    }
    employee {
      id
      nombreCompleto
      fotoPerfil
      telefono
    }
  }
}

