    limit: $limit
    offset: $offset
    orderBy: [{ id: DESC }]
  ) {
    id
    price
    costo
    serviceName
    observations
    type
    paymentMethod
    status
    client {
      id
      nombreCompleto
      fotoPerfil
      telefono
    }
    employee {
      id
      nombreCompleto
      fotoPerfil
      telefono
    }
  }
}

