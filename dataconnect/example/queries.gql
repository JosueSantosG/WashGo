}

query GetPendingEmployeeRequests($businessId: UUID!) @auth(level: USER) {
  business(key: { id: $businessId }) @redact {
    owner {
      id @check(expr: "this == auth.uid", message: "Only the business owner can view pending employee requests")
    }
  }
  employeeRequests(where: {businessId: {eq: $businessId}, status: {eq: PENDING}}) {
    id
    user {
      id
      nombreCompleto
      email
    }
    createdAt
  }
}

query GetAllBusinesses @auth(level: USER, insecureReason: "Obtener todos los negocios") {
