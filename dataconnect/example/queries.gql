query GetUsers @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) @redact {
    roles @check(expr: "'SUPER_ADMIN' in this", message: "Only super admins can view the user list")
  }
  users {
    id
    nombreCompleto
    email
    roles
  }
}

# Example query to get the current authenticated user
