query GetGlobalAppRatings @auth(level: PUBLIC, insecureReason: "Obtener calificaciones globales de la app") {
  reviews {
    id
    appCalificacion
    appComentario
    fechaCreacion
  }
}


query GetOrderDetailsForPayment($orderId: UUID!) @auth(level: NO_ACCESS) {
  order(key: { id: $orderId }) {
    id
    clientId
    status
    price
    serviceName
    business {
      id
      nombre
      owner {
        id
      }
    }
  }
}

query GetInvoiceByOrderId($orderId: UUID!) @auth(level: NO_ACCESS) {
  invoices(where: { orderId: { eq: $orderId } }) {
    id
    invoiceStatus
    pdfUrl
  }
}

query GetInvoiceDetailsForUrl($invoiceId: UUID!) @auth(level: NO_ACCESS) {
  invoice(key: { id: $invoiceId }) {
    pdfUrl
    order {
      clientId
      employeeId
      business {
        id
        owner {
          id
        }
      }
    }
  }
}

query CheckBusinessEmployeeAdmin($businessId: UUID!, $employeeId: String!) @auth(level: NO_ACCESS) {
  businessEmployees(where: {
    businessId: { eq: $businessId }
    employeeId: { eq: $employeeId }
    status: { eq: ACTIVE }
  }) {
    id
  }
  user(key: { id: $employeeId }) {
    roles
  }
}
