query GetClientInvoices(
  $limit: Int
  $offset: Int
  $startDate: Timestamp
  $endDate: Timestamp
  $paymentMethod: PaymentMethod
  $status: InvoiceStatus
  $searchQuery: String
) @auth(level: USER) {
  invoices(
    where: {
      _and: [
        { order: { clientId: { eq_expr: "auth.uid" } } }
        { fechaEmision: { ge: $startDate, le: $endDate } }
        { paymentMethod: { eq: $paymentMethod } }
        { invoiceStatus: { eq: $status } }
        {
          _or: [
            { numeroUnico: { contains: $searchQuery } }
            { order: { serviceName: { contains: $searchQuery } } }
            { order: { business: { nombre: { contains: $searchQuery } } } }
          ]
        }
      ]
    }
    limit: $limit
    offset: $offset
    orderBy: [{ fechaEmision: DESC }]
  ) {
    id
    numeroUnico
    fechaEmision
    subtotal
    discount
    tax
    total
    paymentMethod
    invoiceStatus
    generatedAt
    pdfUrl
    order {
      id
      price
      serviceName
      paymentMethod
      status
      business {
        nombre
      }
      employee {
        nombreCompleto
        telefono
      }
    }
    invoiceItems_on_invoice {
      id
      serviceName
      quantity
      unitPrice
      total
    }
  }
}

