mutation CompleteOrderWithInvoiceOnly(
  $orderId: UUID!,
  $observations: String,
  $invoiceUrl: String,
  $invoiceId: UUID!,
  $numeroUnico: String!,
  $subtotal: Float!,
  $discount: Float!,
  $tax: Float!,
  $total: Float!,
  $paymentMethod: PaymentMethod!,
  $invoiceStatus: InvoiceStatus!
) @auth(level: NO_ACCESS) @transaction {
  query @redact {
    order(key: { id: $orderId }) {
      employeeId
      business {
        owner {
          id
        }
      }
    }
    user(key: { id_expr: "auth.uid" }) @check(expr: "this != null", message: "Usuario no registrado") {
      roles @check(
        expr: "this.exists(r, r == 'SUPER_ADMIN') || (response.query.order != null && (response.query.order.employeeId == auth.uid || response.query.order.business.owner.id == auth.uid))",
        message: "No tienes permiso para completar esta orden"
      )
    }
  }
  order_update(key: { id: $orderId }, data: {
    status: COMPLETADO,
    observations: $observations,
    invoiceUrl: $invoiceUrl
  })
  invoice_insert(data: {
    id: $invoiceId,
    orderId: $orderId,
    numeroUnico: $numeroUnico,
    subtotal: $subtotal,
    discount: $discount,
    tax: $tax,
    total: $total,
    paymentMethod: $paymentMethod,
    invoiceStatus: $invoiceStatus,
    pdfUrl: $invoiceUrl
  })
}

