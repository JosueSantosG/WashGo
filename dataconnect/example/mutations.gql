mutation AcceptOrder($orderId: UUID!, $employeeId: String!) @auth(level: USER, insecureReason: "El empleado es asignado dinámicamente") @transaction {
  query @redact {
    order(key: { id: $orderId }) {
      status @check(expr: "this == 'EN_COLA'", message: "La orden ya ha sido aceptada por otro empleado.")
    }
  }
  order_update(key: { id: $orderId }, data: {
    employeeId: $employeeId,
    status: ACEPTADO
  })
}

mutation UpdateOrderStatus($orderId: UUID!, $status: OrderStatus!) @auth(level: USER) @transaction {
  query @redact {
    order(key: { id: $orderId }) {
      clientId
      employeeId
      business {
        owner {
          id
        }
      }
    }
    user(key: { id_expr: "auth.uid" }) @check(expr: "this != null", message: "Usuario no registrado") {
      roles @check(expr: "this.exists(r, r == 'SUPER_ADMIN') || (response.query.order != null && (response.query.order.clientId == auth.uid || response.query.order.employeeId == auth.uid || response.query.order.business.owner.id == auth.uid))", message: "No tienes permiso para modificar esta orden")
    }
  }
  order_update(key: { id: $orderId }, data: {
    status: $status
  })
}

