  $ruc: String!,
  $businessCode: String!,
  $descripcion: String,
  $telefono: String,
  $latitud: Float,
  $longitud: Float
) @auth(level: USER) {
  business_insert(data: {
    id: $id,
    ownerId_expr: "auth.uid",
    nombre: $nombre,
    ruc: $ruc,
    businessCode: $businessCode,
    descripcion: $descripcion,
    telefono: $telefono,
    latitud: $latitud,
    longitud: $longitud,
    status: PENDING_APPROVAL
  })
  
  user_update(key: { id_expr: "auth.uid" }, data: { currentBusinessId: $id })
}

