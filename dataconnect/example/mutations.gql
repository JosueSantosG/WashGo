# Example mutations for WashGo

# Upsert (update or insert) a user's data based on their auth.uid
mutation UpsertUser($email: String!, $nombreCompleto: String!, $roles: [UserRole!]!, $employeeStatus: EmployeeStatus = UNASSIGNED, $telefono: String, $fotoPerfil: String) @auth(level: USER) @transaction {
  query @redact {
    user(key: { id_expr: "auth.uid" }) @check(
      expr: "this == null || auth.token.email == 'root@washgo.com' || ((!('SUPER_ADMIN' in vars.roles) || 'SUPER_ADMIN' in this.roles) && (!('ADMINISTRADOR' in vars.roles) || ('SUPER_ADMIN' in this.roles || 'ADMINISTRADOR' in this.roles)))",
      message: "No tienes permiso para asignarte roles administrativos"
    ) {
      roles
    }
  }
  user_upsert(data: { id_expr: "auth.uid", email: $email, nombreCompleto: $nombreCompleto, roles: $roles, employeeStatus: $employeeStatus, telefono: $telefono, fotoPerfil: $fotoPerfil })
}

mutation RequestEmployeeAccess($businessId: UUID!) @auth(level: USER) {
  # Update the user's status to PENDING and set the business ID
  user_update(key: { id_expr: "auth.uid" }, data: { employeeStatus: PENDING, currentBusinessId: $businessId })
  
  # Create the request
  employeeRequest_insert(data: {
    userId_expr: "auth.uid",
    businessId: $businessId,
    status: PENDING
  })
}

mutation ApproveEmployeeRequest($requestId: UUID!, $employeeId: String!, $businessId: UUID!) @auth(level: USER) @transaction {
  query @redact {
    business(key: { id: $businessId }) {
      owner {
        id @check(expr: "this == auth.uid", message: "No eres el dueño de este negocio")
      }
    }
  }
  # 1. Update the request status
  employeeRequest_update(key: { id: $requestId }, data: { status: ACTIVE })
  
  # 2. Update the user
  user_update(key: { id: $employeeId }, data: { employeeStatus: ACTIVE, currentBusinessId: $businessId })
  
  # 3. Create the business employee relationship
  businessEmployee_insert(data: {
    businessId: $businessId,
    employeeId: $employeeId,
    status: ACTIVE
  })
}

mutation RejectEmployeeRequest($requestId: UUID!, $employeeId: String!) @auth(level: USER) @transaction {
  query @redact {
    employeeRequest(key: { id: $requestId }) {
      business {
        owner {
          id @check(expr: "this == auth.uid", message: "No tienes permiso para rechazar esta solicitud")
        }
      }
    }
  }
  # 1. Update the request status
  employeeRequest_update(key: { id: $requestId }, data: { status: REJECTED })
  
  # 2. Update the user back to UNASSIGNED and clear business
  user_update(key: { id: $employeeId }, data: { employeeStatus: UNASSIGNED, currentBusinessId: null })
}

mutation CreateBusiness(
