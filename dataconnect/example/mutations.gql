mutation CreateWalkInOrder(
  $businessId: UUID!,
  $clientId: String!,
  $price: Float!,
  $costo: Float!,
  $serviceName: String!,
  $type: OrderType!,
  $paymentMethod: PaymentMethod!,
  $observations: String
) @auth(level: USER) @transaction {
  query @redact {
    business(key: { id: $businessId }) {
      owner {
        id
      }
    }
    businessEmployees(where: {
      businessId: { eq: $businessId }
      employeeId: { eq_expr: "auth.uid" }
      status: { eq: ACTIVE }
    }) @check(expr: "(response.query.business != null && response.query.business.owner != null && response.query.business.owner.id == auth.uid) || this.size() > 0", message: "No autorizado") {
      id
    }
  }
  order_insert(data: {
    businessId: $businessId,
    clientId: $clientId,
    price: $price,
    costo: $costo,
    serviceName: $serviceName,
    type: $type,
    paymentMethod: $paymentMethod,
    status: EN_COLA,
    observations: $observations
  })
}

